<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canteen | Smart University</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="stylesheet" href="canteen.css">
</head>
<body>
  <div class="sidebar">
    <div class="logo">
      <h2>🍽️ University Canteen</h2>
    </div>
    <ul>
      <li class="active" onclick="switchTab(0)"><i class="fas fa-home"></i> Menu</li>
      <li onclick="switchTab(1)"><i class="fas fa-list"></i> Live Queue</li>
      <li onclick="switchTab(2)"><i class="fas fa-receipt"></i> My Orders</li>
      <li onclick="logout()"><i class="fas fa-sign-out-alt"></i> Back to Dashboard</li>
    </ul>
  </div>

  <main class="main">
    <div class="topbar">
      <h2>Canteen Queue Management</h2>
      <div class="right">
        <span id="clock"></span>
        <button class="notify" onclick="showNotifications()"><i class="fas fa-bell"></i></button>
      </div>
    </div>

    <!-- Tab 0: Menu -->
    <div id="tab-0" class="tab-content active">
      <h2>Today's Menu</h2>
      <div class="menu-grid" id="menuGrid">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- Tab 1: Live Queue -->
    <div id="tab-1" class="tab-content">
      <h2>Live Canteen Queue</h2>
      <div class="queue-status">
        <div class="now-serving">
          <h3>Now Serving</h3>
          <div class="token" id="currentToken">C-084</div>
          <button class="btn" onclick="callNextOrder()">Call Next Order</button>
        </div>
        <div class="queue-list">
          <h3>Waiting Students</h3>
          <ul id="waitingList"></ul>
        </div>
      </div>
    </div>

    <!-- Tab 2: My Orders -->
    <div id="tab-2" class="tab-content">
      <h2>My Recent Orders</h2>
      <table class="orders-table">
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Items</th>
            <th>Time</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="ordersBody">
          <!-- Populated by JS -->
        </tbody>
      </table>
    </div>
  </main>

  <script src="canteen.js"></script>
</body>
</html>
