<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canteen (Staff) | Smart University</title>
    <link rel="stylesheet" href="canteen.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="sidebar">
    <h2>🎓 Smart University</h2>
    <ul>
        <li><i class="fa-solid fa-bus"></i> <a href="staff-transport.html" style="color:white;text-decoration:none;">Transport</a></li>
        <li><i class="fa-solid fa-file-lines"></i> <a href="staff-registrar.html" style="color:white;text-decoration:none;">Registrar</a></li>
        <li><i class="fa-solid fa-user-tie"></i> <a href="staff-dean.html" style="color:white;text-decoration:none;">Dean</a></li>
        <li class="active"><i class="fa-solid fa-utensils"></i> Canteen</li>
        <li onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</li>
    </ul>
</div>

<div class="main">
    <div class="topbar">
        <h2 id="welcome">Staff Canteen Dashboard</h2>
        <div id="clock"></div>
    </div>

    <h2 class="heading">🎟 Manage Orders Queue</h2>
    <section class="queue-section" style="display: flex; gap: 20px;">
        <div class="queue-card" style="background: white; padding: 20px; border-radius: 8px;">
            <h3>Currently Serving Order</h3>
            <h1 id="currentToken">None</h1>
            <p>Orders waiting: <span id="waitingCount">0</span></p>
        </div>
        <div class="queue-card" style="background: white; padding: 20px; border-radius: 8px;">
            <h3>Actions</h3>
            <button onclick="callNextToken()" style="background: #28a745; color: white; padding: 15px 30px; font-size: 1.2rem; border-radius: 8px; border: none; cursor: pointer;">
                Call Next Order
            </button>
        </div>
    </section>

    <h2 class="heading" style="margin-top: 30px;">📋 Incoming Orders</h2>
    <div style="background: white; padding: 20px; border-radius: 8px; margin: 0 5%; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <table style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
                <tr style="border-bottom: 2px solid #eee;">
                    <th style="padding: 10px;">Token</th>
                    <th style="padding: 10px;">Student</th>
                    <th style="padding: 10px;">Item</th>
                    <th style="padding: 10px;">Status</th>
                </tr>
            </thead>
            <tbody id="staffOrdersBody">
                <!-- Populated by JS -->
            </tbody>
        </table>
    </div>

</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        fetchQueueStatus();
        setInterval(() => {
            document.getElementById("clock").innerText = new Date().toLocaleTimeString();
        }, 1000);
        setInterval(fetchQueueStatus, 2000);
    });

    function getOrders() {
        return JSON.parse(localStorage.getItem('canteenOrders')) || [];
    }

    function saveOrders(orders) {
        localStorage.setItem('canteenOrders', JSON.stringify(orders));
    }

    function fetchQueueStatus() {
        let orders = getOrders();
        
        const waitingOrders = orders.filter(o => o.status === 'Waiting');
        document.getElementById("waitingCount").innerText = waitingOrders.length;
        
        const servedOrders = orders.filter(o => o.status === 'Served' || o.status === 'Ready');
        const currentlyServing = servedOrders.length > 0 ? servedOrders[servedOrders.length - 1].id : 'None';
        document.getElementById("currentToken").innerText = currentlyServing;
        
        // Populate Table
        const staffOrdersBody = document.getElementById('staffOrdersBody');
        if (staffOrdersBody) {
            staffOrdersBody.innerHTML = '';
            orders.reverse().forEach(o => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="padding: 10px; border-bottom: 1px solid #eee;">${o.id}</td>
                    <td style="padding: 10px; border-bottom: 1px solid #eee;">${o.studentName} (${o.rollNo})</td>
                    <td style="padding: 10px; border-bottom: 1px solid #eee;">${o.item}</td>
                    <td style="padding: 10px; border-bottom: 1px solid #eee;"><strong style="color: ${o.status === 'Waiting' ? 'orange' : 'green'}">${o.status}</strong></td>
                `;
                staffOrdersBody.appendChild(tr);
            });
        }
    }

    function callNextToken() {
        let orders = getOrders();
        let nextOrder = orders.find(o => o.status === 'Waiting');
        
        if (nextOrder) {
            nextOrder.status = 'Ready';
            saveOrders(orders);
            alert("Next order called: " + nextOrder.id);
            fetchQueueStatus();
        } else {
            alert("No more orders in queue.");
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = "login.html";
    }
</script>
</body>
</html>
